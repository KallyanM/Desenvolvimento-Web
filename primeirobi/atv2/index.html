<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade - Criação de Conta</title>
</head>
<body>

    <form action="#" method="post">
        <fieldset>
            <legend>Crie sua Conta</legend> 

                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome"><br><br>
            
                <label for="email">E-mail:</label>
                <input type="email" id="email" required><br><br>

                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" minlength="8" required><br><br>

                <Strong>Gênero:</Strong><br>
                <input type="radio" name="" id="masculino" nome="genero" value="masculino">
                <label for="masculino">Masculino</label><br>
                <input type="radio" name="" id="feminino" nome="genero" value="feminino">
                <label for="masculino">Feminino</label><br><br>

                <label for="biografia">Biografia:</label><br>
                <textarea name="biografia" id="biografia" rows="5" placeholder="Escreva sobre você..."></textarea><br>

                <input type="checkbox" id="termos" name="termos" required>
                <label for="termos"> Eu concordo com os termos de uso</label><br>

                <button type="submit">Criar Conta</button>
                
        </fieldset>
    </form>
    
</body>
</html>
